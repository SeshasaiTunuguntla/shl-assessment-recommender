services:
  - type: web
    name: shl-assessment-recommender
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CATALOG_PATH
        value: data/catalog/shl_catalog.json
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
